<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" fill="none">
  <!-- Mark (64x64, centered vertically) -->
  <svg x="0" y="4" width="64" height="64" viewBox="0 0 56 56">
    <rect width="56" height="56" rx="14" fill="#16192a"/>
    <!-- Row 1: accent key line -->
    <rect x="10" y="13" width="18" height="4.5" rx="2.25" fill="#a688ff"/>
    <!-- Row 2: value, indented -->
    <rect x="16" y="21.5" width="26" height="4" rx="2" fill="#dce4ff" fill-opacity="0.55"/>
    <!-- Row 3: value, indented -->
    <rect x="16" y="29.5" width="18" height="4" rx="2" fill="#dce4ff" fill-opacity="0.55"/>
    <!-- Row 4: nested value, double-indented -->
    <rect x="22" y="37.5" width="20" height="4" rx="2" fill="#dce4ff" fill-opacity="0.28"/>
  </svg>
  <!-- Wordmark -->
  <text x="81" y="46" font-family="'Space Grotesk','Segoe UI',system-ui,-apple-system,sans-serif" font-size="32" font-weight="600" letter-spacing="-1">
    <tspan fill="#a688ff" font-weight="700">Ez</tspan><tspan fill="#e8ecff">Confy</tspan>
  </text>
</svg>
